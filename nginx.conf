# nginx config para daigram (sitio estático, SPA)
server {
  listen 80 default_server;
  listen [::]:80 default_server;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Compresión gzip para texto
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_types
    text/plain
    text/css
    text/xml
    application/javascript
    application/json
    application/xml
    application/wasm
    image/svg+xml;

  # Cache largo para assets con hash
  location ~* \.(?:js|css|woff2?|ttf|otf|eot|ico|svg|png|jpe?g|webp|avif|webmanifest)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  # Sin cache para el HTML principal (siempre la última versión)
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    expires 0;
  }

  # Healthcheck
  location = /healthz {
    access_log off;
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }

  # Robots y sitemap pasan tal cual
  location = /robots.txt { access_log off; }
  location = /sitemap.xml { access_log off; }

  # El editor es una SPA: cualquier ruta que no exista → index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Headers de seguridad básicos
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
}