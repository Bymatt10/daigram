<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="Georgia, 'Times New Roman', serif">
  <!-- Fondo con gradiente sutil -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0c10"/>
      <stop offset="100%" stop-color="#161a22"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4ad8c7"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Patrón de cuadrícula muy sutil -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <path d="M0 100 H1200 M0 200 H1200 M0 300 H1200 M0 400 H1200 M0 500 H1200"/>
    <path d="M100 0 V630 M200 0 V630 M300 0 V630 M400 0 V630 M500 0 V630 M600 0 V630 M700 0 V630 M800 0 V630 M900 0 V630 M1000 0 V630 M1100 0 V630"/>
  </g>

  <!-- Logo -->
  <g transform="translate(80, 80)">
    <text x="0" y="60" font-size="78" font-weight="bold" fill="#ededed" letter-spacing="-2">daigram</text>
    <text x="370" y="42" font-size="22" fill="#4ad8c7">v0.2</text>
    <!-- los tres puntitos animados -->
    <circle cx="378" cy="62" r="5" fill="#4ad8c7"/>
    <circle cx="392" cy="62" r="5" fill="#d08b5b"/>
    <circle cx="406" cy="62" r="5" fill="#7fa66b"/>
    <!-- tagline -->
    <text x="0" y="108" font-size="28" fill="#bdbdbd" font-style="italic">diagramas que fluyen</text>
  </g>

  <!-- Diagrama de ejemplo -->
  <g transform="translate(80, 280)" stroke-linejoin="round" stroke-linecap="round">
    <!-- Nodos -->
    <g stroke="#4ad8c7" stroke-width="3" fill="#0e1014">
      <rect x="0" y="0" width="180" height="80" rx="14"/>
      <rect x="240" y="0" width="180" height="80" rx="14"/>
      <ellipse cx="570" cy="40" rx="90" ry="36"/>
      <rect x="720" y="0" width="180" height="80" rx="14"/>
    </g>

    <!-- Etiquetas -->
    <g fill="#ededed" font-size="22" text-anchor="middle">
      <text x="90" y="50">Cliente</text>
      <text x="330" y="50">API REST</text>
      <text x="570" y="48">PostgreSQL</text>
      <text x="810" y="50">Cache</text>
    </g>

    <!-- Aristas -->
    <g stroke="#4ad8c7" stroke-width="3" fill="none">
      <line x1="180" y1="40" x2="234" y2="40" marker-end="url(#arr)"/>
      <line x1="420" y1="40" x2="476" y2="40" marker-end="url(#arr)"/>
      <path d="M660 40 Q690 40 714 40" marker-end="url(#arr)"/>
    </g>

    <!-- Puntos animados a lo largo de las flechas -->
    <g fill="#4ad8c7">
      <circle cx="207" cy="40" r="5"/>
      <circle cx="448" cy="40" r="5"/>
      <circle cx="687" cy="40" r="5"/>
    </g>

    <!-- Etiqueta de arista -->
    <g font-size="16" fill="#bdbdbd" text-anchor="middle">
      <text x="207" y="22">HTTPS</text>
    </g>
  </g>

  <!-- Features -->
  <g transform="translate(80, 480)" font-size="20" fill="#bdbdbd">
    <g>
      <circle cx="10" cy="10" r="5" fill="#4ad8c7"/>
      <text x="28" y="16">Importa Mermaid</text>
    </g>
    <g transform="translate(220, 0)">
      <circle cx="10" cy="10" r="5" fill="#d08b5b"/>
      <text x="28" y="16">Genera con IA</text>
    </g>
    <g transform="translate(430, 0)">
      <circle cx="10" cy="10" r="5" fill="#7fa66b"/>
      <text x="28" y="16">Exporta PNG / SVG</text>
    </g>
  </g>

  <!-- Footer -->
  <text x="80" y="585" font-size="18" fill="#777" font-style="italic">100% client-side · sin cuenta · sin tracking</text>
  <text x="1120" y="585" font-size="18" fill="#777" text-anchor="end">daigram.app</text>
</svg>